name: Postar Ofertas

on:
  schedule:
    # Roda a cada 30 min entre 11h-01h UTC (= 8h-22h BRT)
    - cron: "0,30 11-23 * * *"
    - cron: "0 0 * * *"
  workflow_dispatch: # permite rodar manualmente

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests python-dotenv apscheduler

      - name: Postar ofertas
        env:
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE: ${{ secrets.EVOLUTION_INSTANCE }}
          WA_CHANNEL_ID: ${{ secrets.WA_CHANNEL_ID }}
          WA_GROUP_IDS: ${{ secrets.WA_GROUP_IDS }}
          ML_AFFILIATE_ID: ${{ secrets.ML_AFFILIATE_ID }}
        run: python run_once.py
